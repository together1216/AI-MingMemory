# 配置示例 - 复制为 config.yaml 并填入你的API Key

llm:
  provider: "minimax"  # 可选: minimax, qwen
  api_key: "${MINIMAX_API_KEY}"  # 环境变量
  base_url: "https://api.minimax.chat/v1"
  model: "abab6.5s-chat"
  # qwen配置示例:
  # provider: "qwen"
  # base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  # model: "qwen-plus"

system:
  seed_path: "./seed"
  memory_path: "./memory"
  auto_backup: true
  backup_interval: 3600

agent_loop:
  force_memory: true
  force_seed: true
  log_level: "INFO"
